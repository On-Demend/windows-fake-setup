<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR10 - WFS</title>
    <link rel="icon" href="img/icon.png" type="image/x-icon">
    <link rel="shortcut icon" href="img/icon.png" type="image/x-icon">
    <style>
        html, body { background-color: #000; color: white; margin: 0; font-family: 'Segoe UI', 'Pretendard', sans-serif; overflow: hidden; }
        body { display: grid; place-items: center; position: relative; }
        main {
            position: absolute; z-index: 1000; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.8s ease-in-out;
        }
        .box {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            width: 550px; padding: 50px 40px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5); display: flex; align-items: center; justify-content: center;
            flex-direction: column; text-align: center; animation: fadeIn 1s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .box > h1 { color: #fff; font-size: 28px; font-weight: 300; margin-bottom: 20px; letter-spacing: -0.5px; }
        .box > h1 span { color: #79BD28 }
        .box > h1 b { color: #0078D7; font-weight: 700; }
        #ta { color: #aaa; font-size: 15px; font-weight: 400; line-height: 1.6; margin-bottom: 40px; }
        #tb { color: #ff4d4d; display: none; font-weight: bold; }
        .close {
            text-decoration: none; display: inline-block; padding: 14px 60px; font-size: 16px; color: #fff;
            font-weight: 600; border-radius: 50px; background: #0078D7; box-shadow: 0 4px 15px rgba(0, 120, 212, 0.4);
            transition: all 0.3s ease; border: none; cursor: pointer;
        }
        .close:hover { background: #004FE1; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 120, 212, 0.6); }
        @media (max-width: 800px) { .box { width: 85vw; padding: 40px 20px; } #ta { display: none; } #tb { display: block; } .close { display: none; } }
        .a { width: 250px; height: 43px; margin-top: 15%; }
        .a img { width: 100%; height: 100%; }
        .b { width: 60px; height: 60px; margin-top: 27.5%; }
        .b img { width: 100%; height: 100%; }
        .c { width: 450px; height: 50px; margin: 0.75%; }
        .c h1 { margin: -1%; font-weight: 400; text-align: center; }
    </style>
</head>
<body>
    <main>
        <div class="box">
            <h1><span>Asrock </span><b>Windows 10</b> Install</h1>
            <h3 id="ta">장시간 자리를 비우실 경우, 절전 모드 해제를 권장합니다.<br>아래 버튼 클릭 시 시작됩니다.</h3>
            <h3 id="tb">지원하지 않는 기기입니다.</h3>
            <a href="#" class="close">설치 시작</a>
        </div>
    </main>

    <div class="a"><img src="img/asrock.png" alt="#"></div>
    <div class="b"><img src="img/10load.gif"></div>
    <div class="c"><h1 id="d">장치를 준비하는 중(0%)</h1></div>

    <script src="js/jquery.js"></script>
    <script>
        let n=0;(function updateText(){document.getElementById("d").textContent=`장치를 준비하는 중(${n}%)`;n+=Math.random()<0.25?Math.floor(Math.random()*2)+2:1;n%=101;setTimeout(updateText,(Math.random()*(4-0.1)+0.1)*1000);})();
        $('.close').click(function(e){
            e.preventDefault();
            $('main').fadeOut(800);
            document.body.style.cursor = "none";
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        });
        document.addEventListener("contextmenu",e=>e.preventDefault());
        document.addEventListener("keydown",e=>{
            if(e.key==="F12"||(e.ctrlKey&&e.shiftKey&&e.key==="I")||(e.ctrlKey&&e.key==="U")) e.preventDefault()
        });
    </script>
</body>
</html>
